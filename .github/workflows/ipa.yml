name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install

      - name: Build Web Assets
        run: bun run build

      - name: Sync Capacitor
        run: npx cap sync ios

      # Apply Info.plist patches AFTER cap sync (sync overwrites it from template)
      - name: Patch Info.plist
        run: |
          PLIST="ios/App/App/Info.plist"

          # 1. Disable ATS so URLSession can fetch resources.tidal.com artwork
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :NSAppTransportSecurity:NSAllowsArbitraryLoads" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$PLIST"

          # 2. Register Appwrite OAuth callback URL scheme for login
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string appwrite-callback-auth-for-monochrome" "$PLIST" 2>/dev/null || true

          echo "Patched Info.plist:"
          /usr/libexec/PlistBuddy -c "Print :NSAppTransportSecurity" "$PLIST"

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Archive App
        run: |
          mkdir -p build
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir Payload
          cp -R build/App.xcarchive/Products/Applications/App.app Payload/
          zip -r Monochrome.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: Monochrome-IPA
          path: Monochrome.ipa
